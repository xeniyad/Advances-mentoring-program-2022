version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -Q "SELECT 1" -No
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  catalog-service:
    build:
      context: ./CatalogService
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=catalogdb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      EventBusConnection: "${EVENT_BUS_CONNECTION:-}"
    ports:
      - "5001:5001"
    depends_on:
      sqlserver:
        condition: service_healthy

  cart-service:
    build:
      context: ./CartingService
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__CartingDb: "Server=sqlserver;Database=cartingdb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      EventBusConnection: "${EVENT_BUS_CONNECTION:-}"
    ports:
      - "5002:5002"
    depends_on:
      sqlserver:
        condition: service_healthy

  order-service:
    build:
      context: ./OrderService
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__OrderDb: "Server=sqlserver;Database=ordersdb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      CartingService__BaseUrl: "http://cart-service:5002/"
    ports:
      - "5003:5003"
    depends_on:
      sqlserver:
        condition: service_healthy
      cart-service:
        condition: service_started

  api-gateway:
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ReverseProxy__Clusters__catalog-cluster__Destinations__catalog__Address: "http://catalog-service:5001/"
      ReverseProxy__Clusters__cart-cluster__Destinations__cart__Address: "http://cart-service:5002/"
      ReverseProxy__Clusters__orders-cluster__Destinations__orders__Address: "http://order-service:5003/"
    ports:
      - "5000:5000"
    depends_on:
      - catalog-service
      - cart-service
      - order-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  sqlserver-data:
