name: Build and Deploy to Azure

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Allow manual trigger

env:
  RESOURCE_GROUP: mentoring-ecommerce
  CONTAINER_ENV: mentoring-container-env
  ACR_NAME: ${{ secrets.ACR_NAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push images
        run: |
          ACR_SERVER=$(az acr show --name ${{ secrets.ACR_NAME }} --query loginServer -o tsv)
          TAG=${{ github.sha }}

          docker build -t ${ACR_SERVER}/catalog-service:${TAG} -f CatalogService/Dockerfile .
          docker build -t ${ACR_SERVER}/cart-service:${TAG} -f CartingService/Dockerfile .
          docker build -t ${ACR_SERVER}/order-service:${TAG} -f OrderService/Dockerfile .
          docker build -t ${ACR_SERVER}/api-gateway:${TAG} -f ApiGateway/Dockerfile .

          docker push ${ACR_SERVER}/catalog-service:${TAG}
          docker push ${ACR_SERVER}/cart-service:${TAG}
          docker push ${ACR_SERVER}/order-service:${TAG}
          docker push ${ACR_SERVER}/api-gateway:${TAG}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Container Apps
        run: |
          ACR_SERVER=$(az acr show --name ${{ secrets.ACR_NAME }} --query loginServer -o tsv)
          TAG=${{ github.sha }}

          for SERVICE in catalog-service cart-service order-service api-gateway; do
              az containerapp update \
                --name $SERVICE \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --image ${ACR_SERVER}/${SERVICE}:${TAG}
          done

  purge-old-images:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Purge images older than 7 days
        run: |
          for REPO in catalog-service cart-service order-service api-gateway; do
            az acr run --registry ${{ secrets.ACR_NAME }} \
              --cmd "acr purge --filter '${REPO}:.*' --ago 7d --untagged" \
              /dev/null
          done
          
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy  # Deploy after backend is updated
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        # env vars are now set in frontend/.env.production
        # env:
        #   VITE_API_URL: ${{ secrets.API_GATEWAY_URL }}
        #   VITE_AUTH_MOCK: "false"

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist